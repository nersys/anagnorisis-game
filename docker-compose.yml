version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: anagnorisis-server
    ports:
      - "8000:8000"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - DATABASE_URL=sqlite+aiosqlite:///./data/anagnorisis.db
      - DEBUG=true
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./server:/app/server:ro
      - ./shared:/app/shared:ro
    networks:
      - anagnorisis-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  anagnorisis-net:
    driver: bridge

# ============================================
# USAGE:
#
#   Start server:  docker-compose up server
#   Rebuild:       docker-compose up --build
#
# iOS client connects to ws://<your-mac-ip>:8000/ws
# See LOCAL_SETUP.md for local network / tunnel setup.
# ============================================
